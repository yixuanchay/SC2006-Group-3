<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — HomeMatch</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="navbar-slot"></div>

<div class="container" style="max-width:900px; padding-top:40px;">

    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:32px;">
        <div>
            <h1 style="margin:0; font-size:1.75rem;">My Dashboard</h1>
            <p id="dashWelcome" style="margin:4px 0 0; color:var(--color-text-muted);">Loading…</p>
        </div>
        <button class="start-btn" style="margin:0; padding:10px 22px; font-size:0.95rem;" onclick="window.location.href='input.html'">
            + New Search
        </button>
    </div>

    <!-- Profile card -->
    <div class="form-container" style="margin-bottom:24px; padding:24px 28px;">
        <h3 style="margin:0 0 16px; font-size:1rem; color:var(--color-text-muted); text-transform:uppercase; letter-spacing:.05em;">My Profile</h3>
        <div id="profileInfo" style="display:grid; grid-template-columns:1fr 1fr; gap:12px 32px;">
            <div><span style="color:var(--color-text-muted); font-size:.85rem;">Name</span><p id="pName" style="margin:2px 0; font-weight:500;">—</p></div>
            <div><span style="color:var(--color-text-muted); font-size:.85rem;">Email</span><p id="pEmail" style="margin:2px 0; font-weight:500;">—</p></div>
            <div><span style="color:var(--color-text-muted); font-size:.85rem;">Citizenship</span><p id="pCitizenship" style="margin:2px 0; font-weight:500;">—</p></div>
        </div>
    </div>

    <!-- Saved searches -->
    <div class="form-container" style="padding:24px 28px;">
        <h3 style="margin:0 0 16px; font-size:1rem; color:var(--color-text-muted); text-transform:uppercase; letter-spacing:.05em;">Saved Searches</h3>
        <div id="savedSearches">
            <p style="color:var(--color-text-muted);">Loading saved searches…</p>
        </div>
    </div>

</div>

<script src="js/app.js"></script>
<script>
(async function initDashboard() {
    const token = localStorage.getItem('hm_token');
    if (!token) { window.location.href = 'index.html'; return; }

    const API = window.HM_API || 'http://localhost:3001';

    // Load profile
    try {
        const r = await fetch(`${API}/api/auth/me`, { headers: { Authorization: `Bearer ${token}` } });
        if (!r.ok) { localStorage.removeItem('hm_token'); window.location.href = 'index.html'; return; }
        const u = await r.json();
        document.getElementById('dashWelcome').textContent = `Welcome back${u.name ? ', ' + u.name : ''}!`;
        document.getElementById('pName').textContent        = u.name || '—';
        document.getElementById('pEmail').textContent       = u.email;
        document.getElementById('pCitizenship').textContent = u.citizenship === 'sc' ? 'Singapore Citizen' : u.citizenship === 'pr' ? 'Permanent Resident' : '—';
    } catch {
        document.getElementById('dashWelcome').textContent = 'Could not load profile.';
    }

    // Load saved searches
    try {
        const r = await fetch(`${API}/api/auth/saved-searches`, { headers: { Authorization: `Bearer ${token}` } });
        const searches = await r.json();
        const container = document.getElementById('savedSearches');

        if (!searches.length) {
            container.innerHTML = '<p style="color:var(--color-text-muted);">No saved searches yet. Run a search and save your results!</p>';
            return;
        }

        container.innerHTML = searches.map(s => {
            const d = new Date(s.created_at);
            const fd = s.form_data;
            const label = s.name || `Search on ${d.toLocaleDateString('en-SG')}`;
            return `
            <div class="result-card" style="margin-bottom:12px;">
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <div>
                        <strong>${label}</strong>
                        <p style="margin:4px 0 0; font-size:.85rem; color:var(--color-text-muted);">
                            ${fd?.flatType || '—'} · ${fd?.purchaseType || '—'} ·
                            Income $${Number(fd?.income || 0).toLocaleString()}/mo
                        </p>
                    </div>
                    <div style="display:flex; gap:8px;">
                        <button onclick="loadSearch(${s.id})" style="font-size:.8rem; padding:6px 14px;" class="start-btn">View</button>
                        <button onclick="deleteSearch(${s.id}, this)" style="font-size:.8rem; padding:6px 14px; background:var(--color-red);" class="start-btn">Delete</button>
                    </div>
                </div>
            </div>`;
        }).join('');
    } catch {
        document.getElementById('savedSearches').innerHTML = '<p style="color:var(--color-red);">Could not load saved searches.</p>';
    }
})();

async function deleteSearch(id, btn) {
    const token = localStorage.getItem('hm_token');
    const API   = window.HM_API || 'http://localhost:3001';
    btn.disabled = true;
    btn.textContent = '…';
    await fetch(`${API}/api/auth/saved-searches/${id}`, { method: 'DELETE', headers: { Authorization: `Bearer ${token}` } });
    btn.closest('.result-card').remove();
}
</script>
</body>
</html>
