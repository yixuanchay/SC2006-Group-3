<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HomeMatch</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- NAVBAR (injected by app.js) -->
<div id="navbar-slot"></div>


<!-- HOMEPAGE HERO -->
<main class="container">

    <h1>HomeMatch</h1>

    <p class="tagline">
        Find the best HDB location for your lifestyle and budget
    </p>

    <p class="hero-sub">Personalised recommendations in minutes — no sign-up required</p>

    <button class="start-btn" onclick="openModal()">
        Get Started
    </button>

</main>


<!-- LOGIN MODAL -->
<div id="loginModal" class="modal">

    <div class="modal-content">

        <span class="close" onclick="closeModal()">×</span>

        <div class="modal-icon">🏠</div>

        <h2>Welcome to HomeMatch</h2>
        <p class="modal-sub">Sign in to save your results and preferences</p>

        <input type="email" id="loginEmail" placeholder="Email address" autocomplete="email">
        <input type="password" id="loginPassword" placeholder="Password" autocomplete="current-password">

        <button class="login-btn">Sign In</button>

        <div class="divider"><span>or</span></div>

        <button class="create-btn">Create Account</button>

        <button class="guest-btn" onclick="continueGuest()">
            Continue as Guest
        </button>

    </div>

</div>


<script src="js/app.js"></script>

</body>
</html>
